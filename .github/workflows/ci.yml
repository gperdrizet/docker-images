name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 4.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Build all images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU for ARM64 builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build all images
        run: make build-all VERSION=${{ inputs.version }}

  test-cpu:
    name: Test CPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Test CPU images
        run: make test-cpu VERSION=${{ inputs.version }}

  test-nvidia:
    name: Test NVIDIA GPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Test NVIDIA images
        run: make test-nvidia VERSION=${{ inputs.version }}

  test-mac:
    name: Test Mac (ARM64) image
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU for ARM64 tests
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Test Mac image
        run: make test-mac VERSION=${{ inputs.version }}

  push:
    name: Push to DockerHub
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [test-cpu, test-nvidia, test-mac]
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create .env for README updates
        run: printf 'DOCKERHUB_USERNAME=%s\nDOCKERHUB_TOKEN=%s\n' "${{ secrets.DOCKERHUB_USERNAME }}" "${{ secrets.DOCKERHUB_TOKEN }}" > .env

      - name: Push all images
        run: make push-all VERSION=${{ inputs.version }}

      - name: Update DockerHub READMEs
        run: make update-readme-all

      - name: Generate version tables
        run: |
          VER="${{ inputs.version }}"

          printf '%s\n' \
            'import importlib.metadata as m, platform, sys' \
            'print(f"| Python | {platform.python_version()} |")' \
            'pkgs = sys.argv[1:]' \
            'for p in pkgs:' \
            '    try: print(f"| {p} | {m.version(p)} |")' \
            '    except Exception: print(f"| {p} | - |")' \
            > /tmp/get_versions.py

          DL_PKGS="torch tensorflow numpy pandas scikit-learn scipy matplotlib seaborn jupyterlab keras-tuner optuna tensorboard"
          LLM_PKGS="torch transformers langchain langchain-community smolagents chromadb sentence-transformers gradio accelerate datasets tiktoken"
          DS_PKGS="numpy pandas scipy scikit-learn xgboost statsmodels matplotlib seaborn plotly jupyterlab optuna"

          > /tmp/version_tables.md

          for variant in nvidia cpu; do
            IMAGE="gperdrizet/deeplearning-${variant}:${VER}"
            printf '\n### deeplearning-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            docker run --rm -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $DL_PKGS >> /tmp/version_tables.md
          done

          for variant in nvidia cpu; do
            IMAGE="gperdrizet/llms-${variant}:${VER}"
            printf '\n### llms-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            EXTRA=""
            [[ "$variant" == "nvidia" ]] && EXTRA="bitsandbytes"
            docker run --rm -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $LLM_PKGS $EXTRA >> /tmp/version_tables.md
            OLLAMA=$(docker run --rm "$IMAGE" ollama --version 2>&1 | grep -oP '[\d.]+' | head -1)
            echo "| ollama | ${OLLAMA} |" >> /tmp/version_tables.md
          done

          for variant in nvidia cpu mac; do
            IMAGE="gperdrizet/datascience-${variant}:${VER}"
            printf '\n### datascience-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            PLATFORM_FLAG=""
            [[ "$variant" == "mac" ]] && PLATFORM_FLAG="--platform linux/arm64"
            docker run --rm $PLATFORM_FLAG -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $DS_PKGS >> /tmp/version_tables.md
          done

          echo "--- Version tables ---"
          cat /tmp/version_tables.md

      - name: Docker logout
        if: always()
        run: docker logout

      - name: Create git tag and GitHub release
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_DISPATCH_TOKEN}@github.com/gperdrizet/docker-images.git"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          RELEASE_BODY=$(cat /tmp/version_tables.md)
          curl -s -X POST \
            -H "Authorization: Bearer $GH_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gperdrizet/docker-images/releases" \
            -d "$(jq -n \
              --arg tag "v${VERSION}" \
              --arg body "$RELEASE_BODY" \
              '{tag_name: $tag, name: $tag, body: $body, generate_release_notes: true}')"
          echo "Created release v${VERSION}"

      - name: Dispatch version sync to devcontainer repos
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          for repo in deeplearning-devcontainer llms-devcontainer datascience-devcontainer; do
            curl -s -X POST \
              -H "Authorization: Bearer $GH_DISPATCH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/gperdrizet/${repo}/dispatches" \
              -d "{\"event_type\": \"docker-images-release\", \"client_payload\": {\"version\": \"${VERSION}\"}}"
            echo "Dispatched sync to $repo"
          done
