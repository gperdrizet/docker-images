name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 4.1.0)'
        required: true
        type: string

jobs:
  build:
    name: Build all images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build all images
        run: make build-all VERSION=${{ inputs.version }}

  test-cpu:
    name: Test CPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test CPU images
        run: make test-cpu VERSION=${{ inputs.version }}

  test-gpu:
    name: Test GPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test GPU images
        run: make test-gpu VERSION=${{ inputs.version }}

  push:
    name: Push to DockerHub
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [test-cpu, test-gpu]
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create .env for README updates
        run: printf 'DOCKERHUB_USERNAME=%s\nDOCKERHUB_TOKEN=%s\n' "${{ secrets.DOCKERHUB_USERNAME }}" "${{ secrets.DOCKERHUB_TOKEN }}" > .env

      - name: Push all images
        run: make push-all VERSION=${{ inputs.version }}

      - name: Update DockerHub READMEs
        run: make update-readme-all

      - name: Docker logout
        if: always()
        run: docker logout

      - name: Create git tag and GitHub release
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_DISPATCH_TOKEN}@github.com/gperdrizet/docker-images.git"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/gperdrizet/docker-images/releases" \
            -d "{\"tag_name\": \"v${VERSION}\", \"name\": \"v${VERSION}\", \"generate_release_notes\": true}"
          echo "Created release v${VERSION}"

      - name: Dispatch version sync to devcontainer repos
        env:
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          for repo in deeplearning-devcontainer llms-devcontainer; do
            curl -s -X POST \
              -H "Authorization: Bearer $GH_DISPATCH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/gperdrizet/${repo}/dispatches" \
              -d "{\"event_type\": \"docker-images-release\", \"client_payload\": {\"version\": \"${VERSION}\"}}"
            echo "Dispatched sync to $repo"
          done

