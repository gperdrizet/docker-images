name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 4.1.0)'
        required: true
        type: string

jobs:
  build-datascience-nvidia:
    name: Build datascience-nvidia
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build datascience-nvidia
        run: |
          make build-datascience-nvidia VERSION=${{ inputs.version }}

  build-datascience-cpu:
    name: Build datascience-cpu
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build datascience-cpu
        run: |
          make build-datascience-cpu VERSION=${{ inputs.version }}

  build-datascience-mac:
    name: Build datascience-mac
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up QEMU for ARM64 builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build datascience-mac
        run: |
          make build-datascience-mac VERSION=${{ inputs.version }}
      - name: Docker logout
        if: always()
        run: docker logout

  build-deeplearning-nvidia:
    name: Build deeplearning-nvidia
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build deeplearning-nvidia
        run: |
          make build-deeplearning-nvidia VERSION=${{ inputs.version }}

  build-deeplearning-cpu:
    name: Build deeplearning-cpu
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build deeplearning-cpu
        run: |
          make build-deeplearning-cpu VERSION=${{ inputs.version }}

  build-deeplearning-mac:
    name: Build deeplearning-mac
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up QEMU for ARM64 builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build deeplearning-mac
        run: |
          make build-deeplearning-mac VERSION=${{ inputs.version }}
      - name: Docker logout
        if: always()
        run: docker logout

  build-llms-nvidia:
    name: Build llms-nvidia
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build llms-nvidia
        run: |
          make build-llms-nvidia VERSION=${{ inputs.version }}

  build-llms-cpu:
    name: Build llms-cpu
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Build llms-cpu
        run: |
          make build-llms-cpu VERSION=${{ inputs.version }}

  build-llms-mac:
    name: Build llms-mac
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up QEMU for ARM64 builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build llms-mac
        run: |
          make build-llms-mac VERSION=${{ inputs.version }}
      - name: Docker logout
        if: always()
        run: docker logout

  test-cpu:
    name: Test CPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [build-datascience-cpu, build-deeplearning-cpu, build-llms-cpu]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Test CPU images
        run: make test-cpu VERSION=${{ inputs.version }}

  test-nvidia:
    name: Test NVIDIA GPU images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [build-datascience-nvidia, build-deeplearning-nvidia, build-llms-nvidia]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check GPU availability
        run: |
          if ! nvidia-smi > /dev/null 2>&1; then
            echo "ERROR: nvidia-smi failed — possible driver/library version mismatch or missing kernel module."
            nvidia-smi 2>&1 || true
            echo "Check that nvidia-persistenced is running: systemctl status nvidia-persistenced"
            exit 1
          fi

      - name: Test NVIDIA images
        run: make test-nvidia VERSION=${{ inputs.version }}

  test-mac:
    name: Test Mac (ARM64) images
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [build-datascience-mac, build-deeplearning-mac, build-llms-mac]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU for ARM64 tests
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Test Mac image
        run: make test-mac VERSION=${{ inputs.version }}

  push-staging:
    name: Push staging tags
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [test-cpu, test-nvidia, test-mac]
    steps:
      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and push :staging images
        env:
          VERSION: ${{ inputs.version }}
        run: |
          for image in datascience-nvidia datascience-cpu datascience-mac \
                       deeplearning-nvidia deeplearning-cpu deeplearning-mac \
                       llms-nvidia llms-cpu llms-mac; do
            docker tag "gperdrizet/${image}:${VERSION}" "gperdrizet/${image}:staging"
            docker push "gperdrizet/${image}:staging"
          done

      - name: Docker logout
        if: always()
        run: docker logout

  dockerhub-push:
    name: Push to DockerHub
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [push-staging]
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Create .env for README updates
        run: printf 'DOCKERHUB_USERNAME=%s\nDOCKERHUB_TOKEN=%s\n' "${{ secrets.DOCKERHUB_USERNAME }}" "${{ secrets.DOCKERHUB_TOKEN }}" > .env

      - name: Push all images
        run: make push-all VERSION=${{ inputs.version }}

      - name: Update DockerHub READMEs
        run: make update-readme-all

      - name: Generate version tables
        run: |
          VER="${{ inputs.version }}"

          printf '%s\n' \
            'import importlib.metadata as m, platform, sys' \
            'print(f"| Python | {platform.python_version()} |")' \
            'pkgs = sys.argv[1:]' \
            'for p in pkgs:' \
            '    try: print(f"| {p} | {m.version(p)} |")' \
            '    except Exception: print(f"| {p} | - |")' \
            > /tmp/get_versions.py

          DL_PKGS="torch tensorflow numpy pandas scikit-learn scipy matplotlib seaborn jupyterlab keras-tuner optuna tensorboard"
          LLM_PKGS="torch transformers langchain langchain-community smolagents chromadb sentence-transformers gradio accelerate datasets tiktoken"
          DS_PKGS="numpy pandas scipy scikit-learn xgboost statsmodels matplotlib seaborn plotly jupyterlab optuna"

          > /tmp/version_tables.md

          for variant in nvidia cpu mac; do
            IMAGE="gperdrizet/deeplearning-${variant}:${VER}"
            printf '\n### deeplearning-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            PLATFORM_FLAG=""
            [[ "$variant" == "mac" ]] && PLATFORM_FLAG="--platform linux/arm64"
            docker run --rm $PLATFORM_FLAG -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $DL_PKGS 2>/dev/null | grep '^|' >> /tmp/version_tables.md
          done

          for variant in nvidia cpu mac; do
            IMAGE="gperdrizet/llms-${variant}:${VER}"
            printf '\n### llms-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            EXTRA=""
            [[ "$variant" == "nvidia" ]] && EXTRA="bitsandbytes"
            PLATFORM_FLAG=""
            [[ "$variant" == "mac" ]] && PLATFORM_FLAG="--platform linux/arm64"
            docker run --rm $PLATFORM_FLAG -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $LLM_PKGS $EXTRA 2>/dev/null | grep '^|' >> /tmp/version_tables.md
            OLLAMA=$(docker run --rm $PLATFORM_FLAG "$IMAGE" ollama --version 2>&1 | grep -oP '[\d.]+' | head -1)
            echo "| ollama | ${OLLAMA} |" >> /tmp/version_tables.md
          done

          for variant in nvidia cpu mac; do
            IMAGE="gperdrizet/datascience-${variant}:${VER}"
            printf '\n### datascience-%s\n| Package | Version |\n| --- | --- |\n' "$variant" >> /tmp/version_tables.md
            PLATFORM_FLAG=""
            [[ "$variant" == "mac" ]] && PLATFORM_FLAG="--platform linux/arm64"
            docker run --rm $PLATFORM_FLAG -v /tmp/get_versions.py:/tmp/get_versions.py \
              "$IMAGE" python /tmp/get_versions.py $DS_PKGS 2>/dev/null | grep '^|' >> /tmp/version_tables.md
          done

          echo "--- Version tables ---"
          cat /tmp/version_tables.md

      - name: Docker logout
        if: always()
        run: docker logout

  github-release:
    name: Create GitHub release
    runs-on: self-hosted
    if: github.repository_owner == 'gperdrizet'
    needs: [dockerhub-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Authenticate git with token
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Create tag for release and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub release
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_BODY=$(cat /tmp/version_tables.md)
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "$RELEASE_BODY"
          echo "Created release v${VERSION}"

      - name: Dispatch version sync to devcontainer repos
        env:
          VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          for repo in deeplearning-devcontainer llms-devcontainer datascience-devcontainer; do
            gh api /repos/gperdrizet/${repo}/dispatches \
              --input - <<EOF
          {"event_type": "docker-images-release", "client_payload": {"version": "${VERSION}"}}
          EOF
            echo "Dispatched sync to $repo"
          done
