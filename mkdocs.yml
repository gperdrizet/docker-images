site_name: Docker Images
site_url: https://gperdrizet.github.io/docker-images/
repo_url: https://github.com/gperdrizet/docker-images
repo_name: gperdrizet/docker-images
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Development:
    - Design Rationale: development/rationale.md
    - Releasing a Version: development/releasing.md
    - Makefile Reference: development/makefile.md
    - CI/CD Infrastructure: development/ci.md
    - Building for ARM64: development/arm64.md
    - Building Custom Wheels: development/wheels.md
  - Images:
    - datascience: images/datascience.md
    - deeplearning: images/deeplearning.md
    - llms: images/llms.md
    - kaggle: images/kaggle.md
